<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">Namaste Nepal
          <img id ="image_logo" src="logo_image.png">
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#">Account</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
            <li><a href="#">Help</a></li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
       

    </nav>

    <!--main Section -->
    <section class="main">
        <h1>Welcome to Namaste Nepal</h1>
        <p id="outputs">Explore beautiful places, book hotels, and plan your journey effortlessly.</p>
        <button onclick="getStarted()">Get Started</button>
    </section>

 
    <div class="js-output">
        <h2>Plan Your Trip</h2>
        <p id="output">Get personalized travel recommendations and book your journey with ease.</p>
        <button type="button" onclick="startPlanning()">Start Planning</button>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
