<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 Firebase User CRUD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h2>🔥 Firebase User Manager</h2>

  <!-- User Form -->
  <form id="userForm">
    <input type="text" id="name" placeholder="Enter Name" required />
    <input type="email" id="email" placeholder="Enter Email" required />
    <input type="text" id="contact" placeholder="Enter Contact Number" required />
    <input type="text" id="address" placeholder="Enter Address" required />
    <input type="hidden" id="userId" />

    <!-- Buttons for Add and Save -->
    <button type="button" onclick="addUser()">➕ Add User</button>
    <button type="submit">Save</button>
  </form>

  <br>

  <!-- Show Users Button -->
  <button onclick="readUsers()">📄 Show All Users</button>

  <br><br>

  <!-- User Table -->
  <table border="1" id="userTable">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Contact</th>
      <th>Address</th>
      <th>Actions</th>
    </tr>
  </table>

  <script type="module" src="unique.js"></script>

</body>
</html>
