<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">Namaste Nepal
          <img id ="image_logo" src="logo_image.png">
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#">Account</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
            <li><a href="#">Help</a></li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
       

    </nav>

    <!-- Hero Section -->
    <section class="main">
        <h1>Welcome to Namaste Nepal</h1>
        <p>Explore beautiful places, book hotels, and plan your journey effortlessly.</p>
        <button onclick="showMessage()">Get Started</button>
    </section>

 
    <div class="js-output">
      <h2>JavaScript Output Example</h2>
      <p id="output">Click the button to see JavaScript in action.</p>
      <button type="button" onclick="showMessage()">Click Me</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
